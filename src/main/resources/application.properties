spring.application.name=githubMcpServer

# ? Disable banner (clean console)
spring.main.banner-mode=off

# ? Important for MCP STDIO server (avoid console logs corruption)
logging.pattern.console=
logging.level.root=ERROR

# =============================
# ? GitHub Configuration
# =============================

# Read from environment variable
github.token=${GITHUB_TOKEN}

# Optional (if you want to hardcode repo base for testing)
github.default-owner=AntoThilifan2026
github.default-branch=main

# =============================
# ? Gemini Configuration
# =============================

# Read from environment variable
gemini.api.key=${GEMINI_API_KEY}

# Model config (optional tuning)
gemini.model=gemini-2.5-flash-lite

# =============================
# ?? MCP Server Configuration
# =============================

# Enable stdio mode when running via JVM argument
# (kept here for clarity; actual activation via -D)
spring.ai.mcp.server.enabled=true
server.port = 8085
